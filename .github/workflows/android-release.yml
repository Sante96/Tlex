name: Android TV — Build & Release APK

on:
  push:
    branches:
      - main
      - master
    paths:
      - "android-tv/**"
      - "frontend/package.json"
  workflow_dispatch:

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "wrapper"
          cache-read-only: false

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(jq -r .version frontend/package.json)
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create local.properties
        working-directory: android-tv
        run: |
          echo "DEFAULT_SERVER_URL=${{ secrets.DEFAULT_SERVER_URL || '' }}" > local.properties

      - name: Build Release APK
        working-directory: android-tv
        run: |
          gradle assembleRelease --no-daemon \
            -PversionName=${{ steps.version.outputs.name }} \
            -PversionCode=${{ steps.version.outputs.code }}

      - name: Sign APK
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          BUILD_TOOLS=$(ls /usr/local/lib/android/sdk/build-tools/ | sort -V | tail -1)
          UNSIGNED="android-tv/app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED="tlex-tv-${{ steps.version.outputs.tag }}.apk"
          /usr/local/lib/android/sdk/build-tools/$BUILD_TOOLS/zipalign -v 4 "$UNSIGNED" aligned.apk
          /usr/local/lib/android/sdk/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks keystore.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out "$SIGNED" aligned.apk
          rm keystore.jks aligned.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "TLEX Android TV v${{ steps.version.outputs.name }}"
          body: |
            ## TLEX Android TV ${{ steps.version.outputs.tag }}

            ### Installazione
            1. Abilita "Origini sconosciute" sul tuo Android TV
            2. Trasferisci l'APK via ADB: `adb install tlex-tv-${{ steps.version.outputs.tag }}.apk`
            3. Oppure usa un file manager per installarlo direttamente
          files: "tlex-tv-${{ steps.version.outputs.tag }}.apk"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
